<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#F9F8F6">
  <title>Fitn — FitLife Hub</title>
  <style>
    body { background: #EFECE6; margin: 0; padding: 0; }
    .loader {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #1A1A1A; font-size: 14px; letter-spacing: 1.4px;
    }
  </style>
</head>
<body>
  <div class="loader">Loading Fitn...</div>
  <script src="flutter.js" defer></script>
  <script>
    window.addEventListener('load', function() {
      _flutter.buildConfig = {
        engineRevision: "a18df97ca5",
        builds: [{"compile_target":"dart:web","renderer":"canvaskit"}]
      };
      _flutter.loader.loadEntrypoint({
        onEntrypointLoaded: async function(engineInitializer) {
          const appRunner = await engineInitializer.initializeEngine();
          await appRunner.runApp();
        }
      });
    });
  </script>
</body>
</html>
