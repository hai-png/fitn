name: fitn_app
description: Fitn — a mobile fitness companion. Flutter (iOS + Android), single Dart codebase.
publish_to: none
version: 3.2.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  go_router: ^14.0.0
  isar: ^3.1.0
  isar_flutter_libs: ^3.1.0
  shared_preferences: ^2.2.0
  supabase_flutter: ^2.6.0
  workmanager: ^0.5.2
  dio: ^5.4.0
  flutter_secure_storage: ^9.0.0
  youtube_player_flutter: ^9.0.1
  fl_chart: ^0.68.0
  flutter_animate: ^4.5.0
  lucide_icons: ^0.257.0
  intl: ^0.19.0
  google_fonts: ^6.2.1
  path_provider: ^2.1.0
  fitn_engine:
    path: ../fitn_engine

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - ../fitn_engine/assets/all_exercises.json
    - ../fitn_engine/assets/split_designs.json
    - ../fitn_engine/assets/movement_patterns.json
    - ../fitn_engine/assets/food_database.json
    - ../fitn_engine/assets/recipe_database.json
    - ../fitn_engine/assets/recipe_database_uncurated.json
    - ../fitn_engine/assets/pre_post_workout_recipes.json
